services:
  kafka:
    image: apache/kafka:3.7.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    command: api
    environment:
      HTTP_PORT: 8080
      STORAGE_PATH: /app/data
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: image-processing
    volumes:
      - image-data:/app/data
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./backend
    command: worker
    environment:
      STORAGE_PATH: /app/data
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: image-processing
      KAFKA_GROUP_ID: image-processor-worker
    volumes:
      - image-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  swagger:
    image: swaggerapi/swagger-ui:v5.17.14
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/openapi/openapi.yaml:ro
    ports:
      - "8081:8080"
    depends_on:
      api:
        condition: service_healthy

volumes:
  image-data:
